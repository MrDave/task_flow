services:

  db:
    container_name: taskflow-db
    image: postgres:18
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    command: >
      gunicorn task_flow_api.wsgi:application
      --bind 0.0.0.0:8000
      --workers 3
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - static_volume:/app/staticfiles

  migrate:
    build:
      context: ./backend
    command: python manage.py migrate
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - tools

  nginx:
    image: nginx:stable
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/static
    depends_on: 
      - backend

volumes:
  postgres_data:
  static_volume:
